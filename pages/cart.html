<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce System</title>
    <link rel="stylesheet" href="/css/cart.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <header>
  <nav>

    <!-- LEFT: Logo -->
    <div class="nav-left">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor" class="bi bi-cart-check" viewBox="0 0 16 16">
        <path d="M11.354 6.354a.5.5 0 0 0-.708-.708L8 8.293 6.854 7.146a.5.5 0 1 0-.708.708l1.5 1.5a.5.5 0 0 0 .708 0z"/>
        <path d="M.5 1a.5.5 0 0 0 0 1h1.11l.401 1.607 1.498 7.985A.5.5 0 0 0 4 12h1a2 2 0 1 0 0 4 2 2 0 0 0 0-4h7a2 2 0 1 0 0 4 2 2 0 0 0 0-4h1a.5.5 0 0 0 .491-.408l1.5-8A.5.5 0 0 0 14.5 3H2.89l-.405-1.621A.5.5 0 0 0 2 1z"/>
      </svg>
      <span class="logo-text">Cartify</span>
    </div>

    <!-- CENTER: Links -->
    <div class="nav-center">
      <a href="/pages/index.html">Home</a>
      <a href="/pages/shop.html">Shop</a>
      <a href="/pages/wishlist.html">Wishlist</a>
      <a href="/pages/cart.html">Cart</a>
    </div>

    <!-- RIGHT: Search -->
    <div class="nav-right">
      <!-- <input type="text" placeholder="Search products..."> -->
    </div>

  </nav>
</header>
    <hr class="divider" style=" 
  border: none;
  height: 2px;
  padding-bottom: 10px;
  background-color: aliceblue;
  margin: 0;
">
    <section class="cart">
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th style="align-items: center; padding-left: 500px;">Name</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total Price</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="cart-items">

                </tbody>
            </table>
        </div>
        <div class="total-box">
            Grand Total: ₹<span id="grand-total"">0</span>
</div>

<button class=" checkout-btn">Proceed to Checkout</button>
        </div>

        <div class="checkout-section">
            <h2>Checkout</h2>

            <form id="checkout-form">
                <label for="Name">Name
                    <input type="text" placeholder="Full Name">
                </label>
                <label for="Address">Address
                    <input type="text" placeholder="Address" required>

                </label>
                <label for="City">City
                    <input type="text" placeholder="City" required>
                </label>
                <label for="Pincode">Pincode
                    <input type="text" placeholder="Pincode" required>
                </label>
                <select required>
                    <option value="">Select Payment Method</option>
                    <option>Cash on Delivery</option>
                    <option>UPI</option>
                    <option>Card</option>
                </select>
                <p>Total Amount: ₹<span id="final-total"></span></p>
                <button type="submit">Place Order</button>
            </form>
        </div>

    </section>

    <script>
const cartItems = document.getElementById("cart-items");
const grandTotal = document.getElementById("grand-total");
const finalTotal = document.getElementById("final-total");

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ✅ FIX: correct quantity initialization
cart = cart.map(item => ({
    ...item,
    quantity: item.quantity || 1
}));

// ✅ DISPLAY CART
function displayCart() {
    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        let itemTotal = item.price * item.quantity;
        total += itemTotal;

        cartItems.innerHTML += `
        <tr>
            <td><img src="${item.image}" width="50"></td>
            <td>${item.title || item.name}</td>
            <td>₹${Math.round(item.price * 80)}</td>
            <td>
                <button class="qty-btn" onclick="changeQty(${index}, -1)">-</button>
                ${item.quantity}
                <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
            </td>
            <td>₹${Math.round(itemTotal * 80)}</td>
            <td>
                <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
            </td>
        </tr>
        `;
    });

    // ✅ Update totals (converted to ₹)
    grandTotal.innerText = "₹" + Math.round(total * 80);
    finalTotal.innerText = "₹" + Math.round(total * 80);
}

// ✅ CHANGE QUANTITY
function changeQty(index, change) {
    cart[index].quantity += change;

    if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

// ✅ REMOVE ITEM
function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    displayCart();
}

// ✅ CHECKOUT BUTTON
const checkoutBtn = document.querySelector(".checkout-btn");
const checkoutSection = document.querySelector(".checkout-section");

checkoutSection.style.display = "none";

checkoutBtn.addEventListener("click", () => {
    checkoutSection.style.display = "block";
    window.scrollTo({
        top: checkoutSection.offsetTop,
        behavior: "smooth"
    });
});

// ✅ FORM SUBMIT
const form = document.getElementById("checkout-form");

form.addEventListener("submit", function (e) {
    e.preventDefault();

    if (cart.length === 0) {
        alert("Cart is empty!");
        return;
    }

    localStorage.removeItem("cart");

    showToast("Order placed successfully 🎉");

    setTimeout(() => {
        window.location.reload();
    }, 1500);
});

// ✅ TOAST
function showToast(msg) {
    const toast = document.createElement("div");
    toast.innerText = msg;

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.background = "#10B981";
    toast.style.color = "white";
    toast.style.padding = "10px";
    toast.style.borderRadius = "5px";

    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
}

// ✅ START
displayCart();

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
