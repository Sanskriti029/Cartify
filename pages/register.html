<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="/Task 6(form validation)/css/login.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            /* display: flex; */
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .register {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        form {
            font-family: Arial, sans-serif;
            background-color: #fff;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input[type="email"],
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;

        }

        button {
            width: 107%;
            padding: 10px;
            background-color: #4F46E5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }
    </style>
    <link rel="stylesheet" href="/Task 6(form validation)/css/styles.css">
</head>

<body>
    <header>
        <nav>

            <!-- LEFT: Logo -->
            <div class="nav-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="currentColor"
                    class="bi bi-cart-check" viewBox="0 0 16 16">
                    <path
                        d="M11.354 6.354a.5.5 0 0 0-.708-.708L8 8.293 6.854 7.146a.5.5 0 1 0-.708.708l1.5 1.5a.5.5 0 0 0 .708 0z" />
                    <path
                        d="M.5 1a.5.5 0 0 0 0 1h1.11l.401 1.607 1.498 7.985A.5.5 0 0 0 4 12h1a2 2 0 1 0 0 4 2 2 0 0 0 0-4h7a2 2 0 1 0 0 4 2 2 0 0 0 0-4h1a.5.5 0 0 0 .491-.408l1.5-8A.5.5 0 0 0 14.5 3H2.89l-.405-1.621A.5.5 0 0 0 2 1z" />
                </svg>
                <span class="logo-text">Cartify</span>
            </div>

            <!-- CENTER: Links -->
            <!-- <div class="nav-center">
                <a href="/pages/index.html">Home</a>
                <a href="/pages/shop.html">Shop</a>
                <a href="/pages/wishlist.html">Wishlist</a>
                <a href="/pages/cart.html">Cart</a>
            </div> -->
        </nav>
    </header>
    <hr class="divider"
        style="  border: none;height: 2px;  padding-bottom: 10px; background-color: aliceblue; margin: 0;">
    <div class="register">
        <h1>Register</h1>
        <p> Please enter your details to register</p>
        <form onsubmit="registerUser(event)">
            <label for="Email">Email:</label>
            <input type="email" id="Email" name="Email">
            <label for="Username">Username:</label>
            <input type="text" id="Username" name="Username">
            <label for="Password">Password:</label>
            <input type="password" id="Password" name="Password">
            <button type="submit">Register</button>
            <p>Already have an account? <a href="/Task 6(form validation)/pages/login.html">Login here</a></p>
        </form>
    </div>
        <footer>
            <p style="background: hsl(231.77, 52.1%, 53.33%);color: white;text-align: center; padding: 20px;">&copy;
                2026 Cartify. All rights reserved.</p>
        </footer>
        <script>


            function registerUser(event) {
                event.preventDefault(); // stop reload

                const email = document.getElementById("Email").value;
                const username = document.getElementById("Username").value;
                const password = document.getElementById("Password").value;

                // Basic validation
                if (!email || !username || !password) {
                    alert("Please fill all fields");
                    return;
                }

                // Create user object
                const user = {
                    email: email,
                    username: username,
                    password: password
                };

                // Save to localStorage
                localStorage.setItem("user", JSON.stringify(user));

                alert("Registration successful!");

                // Redirect to login page
                window.location.href = "/Task 6(form validation)/pages/login.html";
            }

        </script>

</body>

</html>
