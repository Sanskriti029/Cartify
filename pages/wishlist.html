     <div class="wishlist">
        <h1>My Wishlist</h1>
        <p> Your favourite items are saved here</p>
          <div class="wishlisted-product" id="product-list">
                    <p id="loading">Loading products...</p>
                </div>
<script>
 const productList = document.getElementById("product-list");

// Get wishlist from localStorage
let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// Display Wishlist
function displayWishlist() {
    productList.innerHTML = "";

    if (wishlist.length === 0) {
        productList.innerHTML = "<p>Your wishlist is empty ❤️</p>";
        return;
    }

    wishlist.forEach((item, index) => {
        const card = document.createElement("div");
        card.classList.add("product-card");

        card.innerHTML = `
            <img src="${item.image}" style="width:120px;height:120px;object-fit:contain;">
            <h3>${item.title || item.name}</h3>
            <p>₹${Math.round(item.price * 80)}</p>

            <div style="display:flex;gap:10px;justify-content:center;">
                <button onclick="moveToCart(${index})">Move to Cart</button>
                <button onclick="removeFromWishlist(${index})" style="background:red;">Remove</button>
            </div>
        `;

        productList.appendChild(card);
    });
}

// Move to Cart
function moveToCart(index) {
    cart.push(wishlist[index]);
    wishlist.splice(index, 1);

    localStorage.setItem("cart", JSON.stringify(cart));
    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    showToast("Moved to cart!");
    displayWishlist();
}

// Remove item
function removeFromWishlist(index) {
    wishlist.splice(index, 1);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    showToast("Removed from wishlist!");
    displayWishlist();
}

// Toast
function showToast(message) {
    const toast = document.createElement("div");
    toast.innerText = message;

    toast.style.position = "fixed";
    toast.style.bottom = "20px";
    toast.style.right = "20px";
    toast.style.background = "#10B981";
    toast.style.color = "white";
    toast.style.padding = "10px";
    toast.style.borderRadius = "5px";

    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2000);
}

// Run
displayWishlist();
    //  console.log()
</script>
